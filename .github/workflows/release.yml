name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-amd64
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp target/${{ matrix.target }}/release/cdoc.exe cdoc-${{ matrix.suffix }}.exe
          else
            cp target/${{ matrix.target }}/release/cdoc cdoc-${{ matrix.suffix }}
          fi
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: cdoc-${{ matrix.suffix }}*
          generate_release_notes: true
